name: Generate profile visuals

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: concrete-sangminlee
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=%23ca5a3f
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23d1a654

      - name: Download GitHub stats cards
        run: |
          curl -sL -o dist/github-stats.svg \
            "https://github-readme-stats.vercel.app/api?username=concrete-sangminlee&show_icons=true&hide_border=true&title_color=102522&icon_color=ca5a3f&text_color=556762&bg_color=00000000&cache_seconds=86400"
          curl -sL -o dist/top-langs.svg \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=concrete-sangminlee&layout=compact&hide_border=true&title_color=102522&text_color=556762&bg_color=00000000&cache_seconds=86400"
          curl -sL -o dist/streak-stats.svg \
            "https://streak-stats.demolab.com?user=concrete-sangminlee&hide_border=true&background=FFFFFF00&ring=ca5a3f&fire=ca5a3f&currStreakNum=102522&sideNums=102522&currStreakLabel=102522&sideLabels=102522&dates=556762&stroke=556762"

      - name: Validate downloaded SVGs
        run: |
          for f in dist/github-stats.svg dist/top-langs.svg dist/streak-stats.svg; do
            if [ ! -s "$f" ] || ! head -c 100 "$f" | grep -qi 'svg'; then
              echo "Warning: $f may not be a valid SVG, removing to keep previous version"
              rm -f "$f"
            fi
          done

      - name: Publish visuals to output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b output
          git add .
          if git diff --cached --quiet; then
            echo "No visual changes to publish."
            exit 0
          fi
          git commit -m "Update profile visuals"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" output

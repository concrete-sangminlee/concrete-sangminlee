name: Validate profile site

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate and build profile site
        run: make check

      - name: Verify generated docs are committed
        run: git diff --exit-code -- docs/index.html docs/og-preview.svg docs/sitemap.xml docs/robots.txt docs/.nojekyll

      - name: Upload site artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-site-preview
          path: docs

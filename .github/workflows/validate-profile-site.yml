name: Validate profile site

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild static profile page
        run: python3 scripts/build_readme_page.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Verify generated docs are committed
        run: git diff --exit-code -- docs/index.html
